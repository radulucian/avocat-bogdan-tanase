<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAF6EF">
<title>Conexiune offline | Avocat Bogdan Constantin Tănase</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap">
<style>
  :root {
    --bg: #FAF6EF;
    --text: #1F1B16;
    --muted: #6B635A;
    --accent: #B7873A;
    --accent-strong: #8E6829;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1A140E; --text: #F5EEDF; --muted: #C8BBA8; --accent: #D9A05B; --accent-strong: #B7873A; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100svh;
    display: grid;
    place-items: center;
    padding: 2rem;
    font-family: "Inter", system-ui, sans-serif;
    color: var(--text);
    background: var(--bg);
    text-align: center;
  }
  .wrap { max-width: 520px; }
  img { width: 140px; height: auto; margin: 0 auto 1.5rem; display: block; }
  h1 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    margin: 0 0 0.6rem;
    line-height: 1.15;
    color: var(--text);
  }
  p { color: var(--muted); line-height: 1.6; margin: 0 0 1.5rem; }
  .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0.85rem 1.4rem;
    border-radius: 999px;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--accent); color: #FFF; }
  .btn-primary:hover { background: var(--accent-strong); }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <img src="logo.png" alt="Logo Avocat Bogdan Constantin Tănase">
    <h1>Conexiune indisponibilă</h1>
    <p>Pagina solicitată nu poate fi încărcată momentan. Verifică conexiunea la internet și încearcă din nou. Pentru situații urgente, poți suna direct la cabinet.</p>
    <div class="actions">
      <a class="btn btn-primary" href="tel:+40745025701">Sună la cabinet</a>
      <a class="btn btn-ghost" href="./" onclick="location.reload(); return false;">Reîncarcă</a>
    </div>
  </div>
</body>
</html>
